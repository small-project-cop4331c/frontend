<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Manager</title>

    <!-- boostrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- custom style -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container mt-5">

    <!-- top bar: title, user, logout -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="h3 mb-0">Contact Manager</h1>
        <div class="d-flex align-items-center gap-3">
            <span id="navUsername">Hello, User</span>
            <button type="button" class="btn btn-outline-secondary btn-sm" onclick="handleLogout()">Logout</button>
        </div>
    </div>

    <!-- heading row -->
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2 class="h5 mb-0">My Contacts</h2>
        <button type="button" class="btn btn-primary btn-sm" onclick="openAddModal()">+ Add Contact</button>
    </div>

    <!-- search -->
    <div class="mb-3">
        <label for="searchInput" class="form-label">Search Contacts</label>
        <div class="input-group">
            <input
                type="text"
                class="form-control"
                id="searchInput"
                placeholder="Search by name..."
                onkeydown="if (event.key === 'Enter') handleSearch()"
            >
            <button type="button" class="btn btn-primary" onclick="handleSearch()">Search</button>
        </div>
    </div>

    <!-- page feedback (success/error) -->
    <div id="pageMessage" style="display: none; margin-bottom: 10px;"></div>

    <!-- contacts table -->
    <div class="table-responsive border rounded bg-white">
        <table class="table table-bordered table-hover mb-0">
            <thead class="table-light">
                <tr>
                    <th>First Name</th>
                    <th>Last Name</th>
                    <th>Email</th>
                    <th>Phone</th>
                    <th>Date Added</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="contactsTableBody">
                <tr>
                    <td colspan="6" class="text-center text-muted">Search for a contact above</td>
                </tr>
            </tbody>
        </table>
    </div>

</div>


<!-- add / edit contact modal -->
<div class="modal fade" id="contactModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">

            <div class="modal-header">
                <h5 class="modal-title" id="contactModalLabel">Add Contact</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>

            <div class="modal-body">

                <input type="hidden" id="modalContactId">

                <div class="mb-3">
                    <label for="modalFirstName" class="form-label">First Name</label>
                    <input type="text" class="form-control" id="modalFirstName">
                </div>

                <div class="mb-3">
                    <label for="modalLastName" class="form-label">Last Name</label>
                    <input type="text" class="form-control" id="modalLastName">
                </div>

                <div class="mb-3">
                    <label for="modalEmail" class="form-label">Email</label>
                    <input type="email" class="form-control" id="modalEmail">
                </div>

                <div class="mb-3">
                    <label for="modalPhone" class="form-label">Phone</label>
                    <input type="tel" class="form-control" id="modalPhone">
                </div>

                <div id="modalError" style="display: none; color: red;"></div>

            </div>

            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-primary" onclick="handleSaveContact()">Save</button>
            </div>

        </div>
    </div>
</div>


<!-- delete confirmation -->
<div class="modal fade" id="deleteModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-sm">
        <div class="modal-content">

            <div class="modal-header">
                <h5 class="modal-title">Delete Contact</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>

            <div class="modal-body">
                <p class="mb-0">Are you sure you want to delete this contact? This cannot be undone.</p>
                <input type="hidden" id="deleteContactId">
            </div>

            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-danger" onclick="confirmDelete()">Delete</button>
            </div>

        </div>
    </div>
</div>


<!-- bootstrap -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<!-- auth helpers -->
<script src="js/auth.js"></script>

<!-- contacts logic -->
<script src="js/contacts.js"></script>

</body>
</html>
