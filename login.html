<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Manager</title>

    <!-- boostrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- custom style -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>


<div class="container mt-5">
<div class="row justify-content-center">
        <div class="col-md-5">

<h1 class="text-center mb-4">Contact Manager</h1>

            <!-- tabs for login vs signup -->
            <ul class="nav nav-tabs" id="authTabs">
                <li class="nav-item">
                    <button class="nav-link active" id="login-tab" data-bs-toggle="tab" data-bs-target="#loginPanel">
                        Login
                    </button>
                </li>
                <li class="nav-item">
                    <button class="nav-link" id="register-tab" data-bs-toggle="tab" data-bs-target="#registerPanel">
                        Sign Up
                    </button>
                </li>
            </ul>

            <div class="tab-content border border-top-0 p-4 rounded-bottom" id="authTabContent">

                <!-- LOGIN STUFF -->
                <div class="tab-pane fade show active" id="loginPanel">
                    <h2 class="h5 mb-3">Welcome back</h2>

                    <!-- simple error message -->
                    <div id="loginError" style="display: none; color: red; margin-bottom: 10px;"></div>

                    <div class="mb-3">
                        <label for="loginEmail" class="form-label">Email address</label>
                        <input type="email" class="form-control" id="loginEmail" placeholder="email"></input>
                    </div>

                    <div class="mb-3">
                        <label for="loginPassword" class="form-label">Password</label>
                        <input type="password" class="form-control" id="loginPassword" placeholder="password"></input>
                    </div>

                    <button type="button" class="btn btn-primary w-100" onclick="handleLogin()">
                        Log In
                    </button>
                </div>

                <!-- REGISTER / SIGN UP STUFF -->
                <div class="tab-pane fade" id="registerPanel">
                    <h2 class="h5 mb-3">Create an account</h2>

                    <!-- simple error message -->
                    <div id="registerError" style="display: none; color: red; margin-bottom: 10px;"></div>

                    <!-- simple success message -->
                    <div id="registerSuccess" style="display: none; color: green; margin-bottom: 10px;"></div>

                    <div class="mb-3">
                        <label for="regFirstName" class="form-label">First Name</label>
                        <input type="text" class="form-control" id="regFirstName" placeholder="john"></input>
                    </div>

                    <div class="mb-3">
                        <label for="regLastName" class="form-label">Last Name</label>
                        <input type="text" class="form-control" id="regLastName" placeholder="doe"></input>
                    </div>

                    <div class="mb-3">
                        <label for="regEmail" class="form-label">Email address</label>
                        <input type="email" class="form-control" id="regEmail" placeholder="email"></input>
                    </div>

                    <div class="mb-3">
                        <label for="regPassword" class="form-label">Password</label>
                        <input type="password" class="form-control" id="regPassword" placeholder="create a password"></input>
                    </div>

                    <div class="mb-3">
                        <label for="regConfirm" class="form-label">Confirm Password</label>
                        <input type="password" class="form-control" id="regConfirm" placeholder="repeat your password"></input>
                    </div>

                    <button type="button" class="btn btn-success w-100" onclick="handleRegister()">
                        Create Account
                    </button>
                </div>

            </div>
        </div>
    </div>
</div>


<!-- bootstrap -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<!-- auth helpers -->
<script src="js/auth.js"></script>

<script>
  if (isLoggedIn()) {
    window.location.href = "contacts.html";
  }
</script>

</body>
</html>
